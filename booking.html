<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking</title>
    <link rel="icon" href="" type="image/x-icon">

</head>

<body>
    <center>
        <nav
            style="font-weight: 500; background-color: lightblue; font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif; font-size: large; padding: 10px;">
            <a href="index.html">Home</a> |
            <a href="about.html">AboutUs</a> |
            <a href="destination.html">Destinations</a> |
            <a href="booking.html"><strong>Booking</strong></a>
        </nav>
    </center>

    <h1 style="text-align: center; color: brown;">CT Travel Group</h1>

    <hr size="10" color="lightblue">

    <p style="font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
                text-align: center;
                font-size: 150%;
                font-weight: 500;">
        Request a quote for a private & tailor-made holiday in Sri Lanka</p>


    <fieldset>
        <legend style="font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
                        text-align: center;
                        font-size: 120%;">
            Booking Details</legend>
        <br>
        <form
            style="font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;">

            <h4>Personal Details:</h4>
            <label for="salutation">Salutation</label><br>
            <select name="salutation" id="salutation">
                <option value=""> --Select Salutation-- </option>
                <option value="Mr">Mr</option>
                <option value="Mrs">Msr</option>
                <option value="Miss">Miss</option>
                <option value="Ms">Ms</option>
            </select>

            <br><br>

            <label for="f-name">First Name</label><br>
            <input type="text" name="f-name" id="f-name">

            <br><br>

            <label for="l-name">Last Name</label><br>
            <input type="text" name="l-name" id="l-name">

            <br><br>

            <label for="telephone">Telephone</label><br>
            <input type="text" name="telephone" id="telephone">

            <br><br>

            <label for="email">Email</label><br>
            <input type="text" name="email" id="email">

            <br><br>

            <label for="country">Country</label><br>
            <input type="text" name="country" id="country">

            <h4>How many people in your group,</h3>

                <label for="adults">Adults : </label>
                <input type="number" name="adults" id="adults">

                <br><br>
                
                <label for="children">Children : </label>
                <input type="number" name="children" id="children">

            <h4>Your interests:</h4>

                <input type="checkbox" name="check" id="check">
                <label for="check">Beach</label>
                
                <br><br>

                <input type="checkbox" name="check" id="check">
                <label for="check">Culture</label>

                <br><br>

                <input type="checkbox" name="check" id="check">
                <label for="check">Adventures</label>

                <br><br>

                <input type="checkbox" name="check" id="check">
                <label for="check">Food & Drinks</label>

                <br><br>

                <input type="checkbox" name="check" id="check">
                <label for="check">Cycling</label>

                <br><br>

                <input type="checkbox" name="check" id="check">
                <label for="check">I am on Honeymoon</label>

                <br><br>

                <input type="checkbox" name="check" id="check">
                <label for="check">Wildlife</label>

                <br><br>

                <input type="checkbox" name="check" id="check">
                <label for="check">Train journeys</label>


        <br><br>
        </form>
    </fieldset>


</body>

</html>
